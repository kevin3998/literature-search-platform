services:
  postgres:
    image: postgres:16
    container_name: literature-agent-postgres
    environment:
      POSTGRES_DB: literature_agent
      POSTGRES_USER: literature_agent
      POSTGRES_PASSWORD: literature_agent_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - literature_agent_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U literature_agent -d literature_agent"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  literature_agent_postgres:
